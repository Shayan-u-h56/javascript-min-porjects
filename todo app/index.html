<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    .container {
        background: grey;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh;
    }

    .todo {
        width: 40%;
        background: white;
        display: flex;
        flex-direction: column;
        /* align-items: center; */
        text-align: center;
        padding: 10px 15px;

    }

    input {
        margin: 15px 0px;
        padding: 8px;
        width: 100%;

    }

    button {
        width: 20%;
        background: black;
        color: white;
        font-weight: bold;
        outline: none;
        border: none;
        border-radius: 8px;
        padding: 8px;
    }


    .task1 {
        margin: 15px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border: 1px solid #ccc;
    }

    .btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }

    .bttn {
        font-size: 0.7rem;
        text-align: center;
        padding: 6px 12px;
        min-width: 80px;
        cursor: pointer;
    }

    .edit {
        font-size: 0.7rem;
        text-align: center;
        padding: 6px 12px;
        min-width: 80px;
        cursor: pointer;
    }
</style>

<body>
    <div class="container">
        <div class="todo">
            <h1>TODO LIST</h1>
            <input type="text" id="userdata" placeholder="ADD ITEMS..">
            <button type="submit" id="button">ADD</button>
            <div class="task" id="container">

                        <button class="bttn" type="submit">DELETE</button>
                        <button class="bttn" type="submit"> EDIT</button>
                    </div>

                </div> -->
            </div>
        </div>
    </div>
</body>
